<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taschenrechner</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <style></style>
    <div class="all">
    <div class="history"></div>

    <div class="AllRechner">
    <input type="text" class="display" readonly>

  <div class="rechner-all">
    
    <div class="rechen-links">

        <div class="rechner-menu">
            <button onclick="" class="menu-item" id="deleteButton">⌫</button>
            <button onclick="" class="menu-item" id="deleteAll">AC</button>
            <button onclick="" class="menu-item" id="prozentButton">%</button>
        </div>

        <div class="nummernBlock">
            <div class="Reihe1">
                <button onclick="test()" class="ZahlenButton" id="7">7</button>
                <button onclick="" class="ZahlenButton" id="8">8</button>
                <button class="ZahlenButton" id="9">9</button>         
            </div>

            <div class="Reihe2">
                <button onclick="" class="ZahlenButton" id="4">4</button>
                <button onclick="" class="ZahlenButton" id="5">5</button>
                <button onclick="" class="ZahlenButton" id="6">6</button>
            </div>

            <div class="Reihe3">
                <button onclick="" class="ZahlenButton" id="1">1</button>
                <button onclick="" class="ZahlenButton" id="2">2</button>
                <button onclick="" class="ZahlenButton" id="3">3</button>
            </div>

            <div class="Reihe4">
                <button onclick="" class="switchbutton" id="switch">-/+</button>
                <button onclick="" class="ZahlenButton" id="0">0</button>
                <button onclick="" class="kommabutton" id="komma">,</button>
            </div>
        </div>     
    </div>

     <div class="Rechenzeichen">
            <button onclick="" class="RechenButton" id="geteilt">÷</button>
            <button onclick="" class="RechenButton" id="mal">×</button>
            <button onclick="" class="RechenButton" id="minus">-</button>
            <button onclick="" class="RechenButton" id="plus">+</button>
            <button onclick="" class="RechenButton" id="ergibt">=</button>
        </div>
  </div>
    </div>
    </div>


    <script type="module" src="script.js"></script>
</body>
</html>
